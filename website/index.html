<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comprehensive Cancer Center</title>
    <meta
      name="description"
      content="Evidence-based cancer care with multidisciplinary specialists and supportive services."
    />
    <meta name="robots" content="index,follow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/app.css?v=151193b6" />
    <link rel="stylesheet" href="/css/site-themes.css?v=8f8f5bca" />

    <script>
      // Apply theme before first paint to prevent flash
      (function () {
        try {
          var theme = localStorage.getItem("site-theme") || "auto";
          if (theme === "auto") {
            var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            var hour = new Date().getHours();
            var isDay = hour >= 6 && hour < 19;
            theme = prefersDark ? "dark" : (isDay ? "light" : "dark");
          }
          document.documentElement.setAttribute("data-site-theme", theme);
        } catch (e) {}
      })();
    </script>

    <script>
      // Apply language direction before first paint to avoid layout shifts.
      (function () {
        try {
          var lang = localStorage.getItem("lang") || "en";
          var d = document.documentElement;
          d.setAttribute("lang", lang === "ar" ? "ar" : "en");
          d.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
          d.classList.toggle("lang-ar", lang === "ar");
          d.classList.toggle("lang-en", lang !== "ar");
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var scale = parseFloat(localStorage.getItem("site-zoom-level"));
          if (!isFinite(scale)) scale = 1;
          scale = Math.min(1.5, Math.max(0.8, scale));
          var width = String(Math.round((100 / scale) * 100000) / 100000);
          var style = document.createElement("style");
          style.textContent = "body.site-zoom-enabled{overflow-x:hidden;}.site-zoom-frame{width:100%;overflow-x:hidden;}#app-zoom-wrapper{display:block;margin:0 auto;transform-origin:top center;transform:scale(" + scale + ");width:" + width + "%;min-height:" + (scale < 1 ? width + "vh" : "100vh") + ";}";
          document.head.appendChild(style);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="site-zoom-enabled">
    <div class="site-zoom-frame">
    <div id="app-zoom-wrapper">
    <a class="skip-link" href="#app-main">Skip to content</a>

    <div id="app">
      <div class="app-loader" role="status" aria-live="polite" aria-label="Loading">
        <div class="app-loader__bar"></div>
        <div class="app-loader__card">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--btn"></div>
        </div>
      </div>
    </div>

    <noscript>
      <div class="noscript">
        This website requires JavaScript to display content. Please enable JavaScript and reload.
      </div>
    </noscript>

    <script src="/js/site-theme-manager.js?v=beb6a86f"></script>
    <!-- SPA app.js removed: shell.js, data.js, i18n.js, and views modules are missing. Server renders the site. -->
    <script src="/js/zoom.js?v=f6bb3bb8"></script>
    </div>
    </div>
  </body>
</html>
