<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comprehensive Cancer Center</title>
    <meta
      name="description"
      content="Evidence-based cancer care with multidisciplinary specialists and supportive services."
    />
    <meta name="robots" content="index,follow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />
    <link

      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/app.css?v=07d9f5e4" />

    <script>
      // Apply language direction before first paint to avoid layout shifts.
      (function () {
        try {
          var lang = localStorage.getItem("lang") || "en";
          var d = document.documentElement;
          d.setAttribute("lang", lang === "ar" ? "ar" : "en");
          d.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
          d.classList.toggle("lang-ar", lang === "ar");
          d.classList.toggle("lang-en", lang !== "ar");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#app-main">Skip to content</a>

    <div id="app">
      <div class="app-loader" role="status" aria-live="polite" aria-label="Loading">
        <div class="app-loader__bar"></div>
        <div class="app-loader__card">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--btn"></div>
        </div>
      </div>
    </div>

    <noscript>

        This website requires JavaScript to display content. Please enable JavaScript and reload.
      </div>
    </noscript>

    <script type="module" src="/js/app.js?v=13ded24a"></script>
  </body>
</html>
