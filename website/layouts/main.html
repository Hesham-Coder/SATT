<!DOCTYPE html>
<html lang="{{LANGUAGE}}" dir="{{DIRECTION}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>

    {{SEO_TAGS}}

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

    <link rel="stylesheet" href="/css/tailwind.output.css?v=dd462add" />
    <link rel="stylesheet" href="/css/app.css?v=151193b6" />
    <link rel="stylesheet" href="/css/site-themes.css?v=8f8f5bca" />

    <script>
      (function () {
        try {
          var theme = localStorage.getItem("site-theme") || "auto";
          if (theme === "auto") {
            var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            var hour = new Date().getHours();
            var isDay = hour >= 6 && hour < 19;
            theme = prefersDark ? "dark" : isDay ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-site-theme", theme);
        } catch (e) {}
      })();

      (function () {
        try {
          var lang = localStorage.getItem("lang") || "{{LANGUAGE}}";
          var root = document.documentElement;
          root.setAttribute("lang", lang === "ar" ? "ar" : "en");
          root.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
          root.classList.toggle("lang-ar", lang === "ar");
          root.classList.toggle("lang-en", lang !== "ar");
        } catch (e) {}
      })();
    </script>
  </head>

  <body class="site-shell">
    <a class="skip-link" href="#app-main">Skip to content</a>
    <div class="site-page">
      {{HEADER}}

      <noscript>
        <div class="noscript shell-container">JavaScript is disabled. Basic navigation and page content are still available.</div>
      </noscript>

      <main id="app-main" class="site-main">
        {{CONTENT}}
      </main>

      {{FOOTER}}
    </div>

    <div id="wa-float" class="wa-float" hidden data-number="{{WA_NUMBER}}" data-message="{{WA_MESSAGE}}">
      <a id="wa-float-link" class="wa-float__link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp" title="WhatsApp">
        <svg class="wa-float__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="26" height="26" preserveAspectRatio="xMidYMid meet" fill="currentColor" aria-hidden="true" focusable="false">
          <path d="M13.601 2.326A7.854 7.854 0 008.022 0a7.974 7.974 0 00-6.91 11.96L0 16l4.135-1.086a7.945 7.945 0 003.888 1.01h.003A7.975 7.975 0 0016 7.95a7.876 7.876 0 00-2.399-5.624zM8.025 14.57h-.002a6.6 6.6 0 01-3.357-.92l-.24-.144-2.456.644.656-2.394-.156-.247a6.59 6.59 0 01-1.007-3.506A6.668 6.668 0 018.025 1.43a6.57 6.57 0 014.687 1.956 6.523 6.523 0 011.944 4.645c-.003 3.66-2.997 6.538-6.631 6.538zm3.633-4.97c-.197-.1-1.164-.576-1.344-.641-.18-.066-.311-.1-.442.1-.131.197-.508.64-.623.773-.115.132-.23.148-.426.05-.197-.1-.83-.305-1.58-.973-.583-.52-.976-1.162-1.09-1.359-.115-.197-.012-.304.086-.402.089-.089.197-.23.295-.345.098-.114.131-.196.197-.328.066-.132.033-.247-.016-.345-.05-.099-.442-1.067-.606-1.462-.159-.382-.321-.33-.442-.336-.115-.006-.247-.007-.378-.007-.131 0-.344.05-.525.247-.18.197-.689.674-.689 1.642s.706 1.903.804 2.035c.099.131 1.388 2.12 3.362 2.972.469.203.835.324 1.12.414.471.15.9.129 1.238.078.378-.056 1.164-.476 1.328-.935.164-.46.164-.854.115-.935-.05-.082-.18-.132-.377-.23z" />
        </svg>
        <span class="wa-float__fallback" aria-hidden="true">WA</span>
      </a>
    </div>

    <script>
      (function () {
        var container = document.getElementById('wa-float');
        if (!container) return;
        var number = (container.getAttribute('data-number') || '').replace(/\D+/g, '');
        var message = encodeURIComponent(container.getAttribute('data-message') || '');
        if (!number) return;
        var link = document.getElementById('wa-float-link');
        if (container) container.hidden = false;
        if (link) {
          link.href = 'https://wa.me/' + number + '?text=' + message;
          link.setAttribute('title', 'Chat on WhatsApp');
          link.setAttribute('aria-label', 'Chat on WhatsApp');
        }
      })();
    </script>

    <script src="/js/shared/lang-toggle.js?v=582ddb0d"></script>
    <script src="/js/shared/navigation.js?v=3d3b859a"></script>
    <script src="/js/shared/api-client.js?v=55f765a6"></script>
    <script src="/js/shared/utils.js?v=e50b63f6"></script>
    <script src="/js/site-theme-manager.js?v=beb6a86f"></script>
    <script src="/js/zoom.js?v=f6bb3bb8"></script>

    <script>
      (function() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, {
          root: null,
          rootMargin: "0px",
          threshold: 0.1
        });

        document.querySelectorAll('[data-fade-in]').forEach(el => observer.observe(el));
      })();
    </script>
  </body>
</html>
